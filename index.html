<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dou AI Training</title>
  <style>
    :root { color-scheme: light dark; --bg: #f7f7f4; --fg: #1f2933; --muted: #667085; --card: #ffffff; --line: #d6d9dd; --accent: #0f766e; }
    @media (prefers-color-scheme: dark) { :root { --bg: #111418; --fg: #eef2f6; --muted: #a7b0bd; --card: #181c21; --line: #303741; --accent: #2dd4bf; } }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--fg); line-height: 1.65; }
    main { max-width: 760px; margin: 0 auto; padding: 56px 20px; }
    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 28px; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 42px); line-height: 1.15; }
    p { margin: 0 0 18px; color: var(--muted); }
    nav { display: grid; gap: 12px; margin-top: 28px; }
    a.card { display: block; padding: 18px; border: 1px solid var(--line); border-radius: 8px; color: var(--fg); text-decoration: none; background: color-mix(in srgb, var(--card), var(--accent) 4%); }
    a.card strong { display: block; font-size: 18px; margin-bottom: 4px; }
    a.card span { color: var(--muted); }
    footer { margin-top: 24px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>斗 AI 训练</h1>
      <p>斗地主牌技训练-AI复盘教练的公开信息页面，用于 App Store 隐私政策与技术支持。</p>
      <nav aria-label="Site links">
        <a class="card" href="privacy.html"><strong>隐私政策</strong><span>Privacy Policy for Dou AI Training.</span></a>
        <a class="card" href="support.html"><strong>技术支持</strong><span>Support information and issue reporting.</span></a>
      </nav>
    </section>
    <footer>Last updated: 2026-06-14</footer>
  </main>
</body>
</html>
